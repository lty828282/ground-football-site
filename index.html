<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그라운드 — 축구 콘텐츠 허브</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <div id="site-header"></div>

  <div class="hero-wrap">
    <div class="hero-head">
      <div class="eyebrow">Kick-off</div>
      <h1>오늘의 축구, 한 경기장 안에 모았다</h1>
      <p>훈련 영상부터 축구화 리뷰, 실시간 유튜브 랭킹까지 — 포지션별로 정리된 축구 콘텐츠를 한눈에 확인하세요.</p>
    </div>

    <div class="pitch">
      <div class="halfway"></div>
      <div class="center-circle">
        <a class="center-badge" href="/pages/category.html?cat=popular"><small>HUB</small>인기글<br>모아보기</a>
      </div>
      <div class="formation">
        <div class="lane single">
          <a class="pcard" href="/pages/ranking.html"><div class="role">GK · 데이터</div><div class="name">유튜브 랭킹</div></a>
        </div>
        <div class="lane">
          <a class="pcard" href="/pages/videos.html?section=review"><div class="role">DF · 장비</div><div class="name">축구화 리뷰</div></a>
          <a class="pcard" href="/pages/videos.html?section=youth"><div class="role">DF · 기초</div><div class="name">유소년 축구</div></a>
        </div>
        <div class="lane single">
          <a class="pcard" href="/pages/videos.html?section=training"><div class="role">MF · 기본기</div><div class="name">축구 훈련</div></a>
        </div>
        <div class="lane single">
          <a class="pcard" href="/pages/news.html"><div class="role">FW · 이슈</div><div class="name">축구 정보</div></a>
        </div>
      </div>
    </div>
  </div>

  <div class="feed-section">
    <div class="feed-head"><span class="live-dot"></span><h2>실시간 인기</h2></div>
    <div class="feed-grid" id="popular-feed">
      <div class="empty-state">불러오는 중…</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><h2>축구 정보</h2><a href="/pages/news.html">더보기 →</a></div>
    <div class="news-list" id="home-news"></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>축구 훈련</h2><a href="/pages/videos.html?section=training">더보기 →</a></div>
    <div class="card-grid" id="training-cards"></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>유튜브 채널 랭킹</h2><a href="/pages/ranking.html">전체 순위 →</a></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>순위</th><th>채널</th><th>구독자</th><th>주간 증감</th><th>카테고리</th></tr>
        </thead>
        <tbody id="ranking-rows"></tbody>
      </table>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="/assets/js/icons.js"></script>
  <script src="/assets/js/render.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/home.js"></script>
</body>
</html>
