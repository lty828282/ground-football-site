name: Export Cardnews

on:
  workflow_dispatch:
    inputs:
      slug:
        description: '카드뉴스 슬러그 (예: intro, soccer-shoes)'
        required: true
        default: 'intro'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Export cards
        run: python3 scripts/export_cards.py "${{ github.event.inputs.slug }}"

      - name: Commit exports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "카드뉴스 이미지 추출: ${{ github.event.inputs.slug }}"
            git push
          fi
