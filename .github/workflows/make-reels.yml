name: Make Reels

on:
  workflow_dispatch:
    inputs:
      which:
        description: '만들 릴스 (A=스톡+자막, B=카드모션, both=둘다)'
        required: true
        default: 'both'

permissions:
  contents: write

jobs:
  reels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-nanum fonts-nanum-extra
          pip install pillow

      - name: Build reels
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python3 scripts/make_reels.py "${{ github.event.inputs.which }}"

      - name: Commit reels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/reels/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "릴스 생성: ${{ github.event.inputs.which }}"
            git push
          fi
