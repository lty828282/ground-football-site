name: Build Food Library

on:
  workflow_dispatch:
    inputs:
      foods:
        description: '특정 음식만 (예: choco_milk,banana). 비우면 전체'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build food library
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python3 scripts/build_food_lib.py "${{ github.event.inputs.foods }}"

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/food-lib
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "음식 사진 라이브러리 구축"
            git push
          fi
