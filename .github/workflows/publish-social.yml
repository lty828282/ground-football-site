name: Publish Social

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: '드라이런(게시 안 하고 무엇을 올릴지 출력)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish next post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 scripts/publish_social.py --dry-run
          else
            python3 scripts/publish_social.py
          fi

      - name: Commit queue update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/post-queue.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "소셜 자동 게시: 큐 업데이트"
            git push
          fi
