<title>성장기 아이 축구화 고르는 법 · 카드뉴스</title>
<style>
  :root{
    --ink:#171b16;
    --navy:#1b2338;
    --blue:#2c56a3;
    --blue-deep:#1f3f80;
    --cream:#f6f2e6;
    --cream-line:#dcd5bf;
    --muted:#8a8776;
    --stone-1:#4f5342;
    --stone-2:#8b8a6c;
    --stone-3:#cdc6a4;
  }
  *{box-sizing:border-box;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Pretendard",sans-serif;
    display:flex;
    justify-content:center;
    padding:2.5rem 1rem;
  }
  .card{
    position:relative;
    width:360px;
    max-width:100%;
    aspect-ratio:4/5;
    border-radius:22px;
    overflow:hidden;
    border:1.5px solid rgba(23,27,22,0.5);
    display:flex;
    flex-direction:column;
    background:var(--cream);
    box-shadow:0 18px 40px -20px rgba(0,0,0,0.35);
  }
  .photo{
    position:relative;
    flex:0 0 58%;
    background:linear-gradient(150deg,var(--stone-1) 0%,var(--stone-2) 55%,var(--stone-3) 100%);
  }
  .vtag{
    position:absolute;
    top:0;
    bottom:0;
    width:22px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .vtag span{
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-size:9px;
    font-weight:600;
    letter-spacing:2px;
    color:rgba(255,255,255,0.55);
    white-space:nowrap;
  }
  .vtag.left{left:6px;}
  .vtag.right{right:6px;}
  .photo-top{
    position:relative;
    z-index:1;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:16px 30px 0;
  }
  .badge-bar{
    width:26px;
    height:3px;
    background:var(--blue);
    border-radius:2px;
    margin-bottom:6px;
  }
  .badge{
    display:flex;
    align-items:center;
    gap:4px;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.5px;
    color:var(--navy);
  }
  .handle{
    font-size:11px;
    font-weight:700;
    color:var(--navy);
  }
  .text-zone{
    flex:1;
    padding:20px 26px 0;
    display:flex;
    flex-direction:column;
  }
  .kicker{
    font-size:11px;
    font-weight:700;
    letter-spacing:1px;
    color:var(--blue);
    margin-bottom:8px;
  }
  .title{
    font-size:25px;
    font-weight:800;
    line-height:1.28;
    color:var(--ink);
    margin:0 0 10px;
    text-wrap:balance;
  }
  .underline{
    width:88px;
    height:3px;
    background:var(--blue);
    border-radius:2px;
    margin-bottom:12px;
  }
  .sub{
    font-size:14.5px;
    font-weight:700;
    line-height:1.5;
    color:var(--ink);
    margin-bottom:6px;
  }
  .sub b{
    color:var(--blue-deep);
    font-weight:800;
  }
  .cta{
    font-size:12px;
    color:var(--muted);
    margin-bottom:14px;
  }
  .bottom{
    padding:0 26px 18px;
  }
  .dots{
    border-top:1px dashed var(--cream-line);
    margin-bottom:10px;
  }
  .mark{
    text-align:center;
    font-size:12px;
    font-weight:800;
    letter-spacing:2px;
    color:var(--navy);
  }
</style>
<div class="card">
  <div class="photo">
    <div class="vtag left"><span>DEVELOP · DISCOVER · DELIVER</span></div>
    <div class="vtag right"><span>GROUND YOUTH CLASS</span></div>
    <div class="photo-top">
      <div>
        <div class="badge-bar"></div>
        <div class="badge">유소년 축구화 고르는 방법 <span aria-hidden="true">›</span></div>
      </div>
      <div class="handle">groundyouth.com</div>
    </div>
  </div>
  <div class="text-zone">
    <div class="kicker">FOOTBALL GEAR GUIDE</div>
    <h2 class="title">성장기 아이 축구화,<br>이렇게 고르세요</h2>
    <div class="underline"></div>
    <div class="sub">브랜드보다 <b>우리 아이 발</b>과 <b>뛰는 환경</b>이 먼저.</div>
    <div class="cta">저장해두고 다음 편도 확인하세요</div>
  </div>
  <div class="bottom">
    <div class="dots"></div>
    <div class="mark">GROUND YOUTH</div>
  </div>
</div>
